name: Build Android Release

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-release:
    name: Build Play-safe release artifacts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0" "platform-tools"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.13"

      - name: Decode release keystore when configured
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 --decode > release.keystore

      - name: Build release artifacts
        run: |
          if [ -f release.keystore ]; then
            gradle assembleRelease bundleRelease --no-daemon --stacktrace \
              -PJARVIS_KEYSTORE_FILE=release.keystore \
              -PJARVIS_KEYSTORE_PASSWORD='${{ secrets.ANDROID_KEYSTORE_PASSWORD }}' \
              -PJARVIS_KEY_ALIAS='${{ secrets.ANDROID_KEY_ALIAS }}' \
              -PJARVIS_KEY_PASSWORD='${{ secrets.ANDROID_KEY_PASSWORD }}'
          else
            gradle bundleRelease --no-daemon --stacktrace
          fi

      - name: Upload Play Store AAB
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-release-aab
          path: build/outputs/bundle/release/Jarvis-release.aab
          if-no-files-found: error

      - name: Upload signed APK when keystore is configured
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: Jarvis-release-apk
          path: build/outputs/apk/release/Jarvis-release.apk
          if-no-files-found: error

      - name: Publish AAB on tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: build/outputs/bundle/release/Jarvis-release.aab

      - name: Publish signed APK on tagged release when keystore is configured
        if: startsWith(github.ref, 'refs/tags/v') && secrets.ANDROID_KEYSTORE_BASE64 != ''
        uses: softprops/action-gh-release@v2
        with:
          files: build/outputs/apk/release/Jarvis-release.apk
